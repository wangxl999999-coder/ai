{extend name="layout/base" /}

{block name="content"}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-unlock text-primary fs-1"></i>
                        <h3 class="mt-2">找回密码</h3>
                        <p class="text-muted small">请输入您注册时使用的手机号</p>
                    </div>
                    
                    <form id="forgotForm">
                        <div class="mb-3">
                            <label class="form-label">手机号</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                <input type="tel" class="form-control" name="phone" placeholder="请输入手机号" maxlength="11">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">验证码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                <input type="text" class="form-control" name="code" placeholder="请输入验证码" maxlength="6">
                                <button type="button" class="btn btn-outline-primary" id="sendCodeBtn">
                                    发送验证码
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">新密码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" name="password" placeholder="请输入新密码">
                            </div>
                            <div class="form-text">密码长度6-20位</div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">确认新密码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" name="confirm_password" placeholder="请再次输入新密码">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
                            重置密码
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="text-muted">想起密码了？</span>
                        <a href="/user/login" class="text-decoration-none">立即登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{/block}

{block name="script"}
<script>
$(function() {
    let countdown = 0;
    
    // 发送验证码
    $('#sendCodeBtn').click(function() {
        const phone = $('input[name="phone"]').val();
        
        if (!phone) {
            toastr.error('请输入手机号');
            return;
        }
        
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            toastr.error('手机号格式不正确');
            return;
        }
        
        if (countdown > 0) {
            return;
        }
        
        const btn = $(this);
        btn.prop('disabled', true);
        
        $.post('/user/send-code', {
            phone: phone,
            type: 'reset_password'
        }, function(res) {
            if (res.code === 200) {
                toastr.success('验证码已发送');
                
                countdown = 60;
                btn.text(countdown + 's');
                
                const timer = setInterval(function() {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        btn.prop('disabled', false).text('发送验证码');
                    } else {
                        btn.text(countdown + 's');
                    }
                }, 1000);
            } else {
                toastr.error(res.msg);
                btn.prop('disabled', false);
            }
        }, 'json').fail(function() {
            toastr.error('发送失败，请重试');
            btn.prop('disabled', false);
        });
    });
    
    // 提交重置密码
    $('#forgotForm').submit(function(e) {
        e.preventDefault();
        
        const phone = $('input[name="phone"]').val();
        const code = $('input[name="code"]').val();
        const password = $('input[name="password"]').val();
        const confirmPassword = $('input[name="confirm_password"]').val();
        
        if (!phone) {
            toastr.error('请输入手机号');
            return;
        }
        
        if (!code) {
            toastr.error('请输入验证码');
            return;
        }
        
        if (!password) {
            toastr.error('请输入新密码');
            return;
        }
        
        if (password.length < 6 || password.length > 20) {
            toastr.error('密码长度应为6-20位');
            return;
        }
        
        if (password !== confirmPassword) {
            toastr.error('两次输入的密码不一致');
            return;
        }
        
        const btn = $('#submitBtn');
        btn.prop('disabled', true).text('重置中...');
        
        $.post('/user/do-reset-password', {
            phone: phone,
            code: code,
            password: password
        }, function(res) {
            if (res.code === 200) {
                toastr.success('密码重置成功');
                setTimeout(function() {
                    location.href = '/user/login';
                }, 1000);
            } else {
                toastr.error(res.msg);
            }
        }, 'json').always(function() {
            btn.prop('disabled', false).text('重置密码');
        });
    });
});
</script>
{/block}
