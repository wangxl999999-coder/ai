<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{$title|default='管理后台'} - AI提示词平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .admin-sidebar {
            position: fixed;
            top: 56px;
            bottom: 0;
            left: 0;
            z-index: 1000;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #212529;
            border-right: 1px solid #343a40;
        }
        .admin-sidebar .nav-link {
            color: rgba(255, 255, 255, 0.75);
            padding: 0.75rem 1rem;
            border-left: 3px solid transparent;
        }
        .admin-sidebar .nav-link:hover,
        .admin-sidebar .nav-link:focus {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .admin-sidebar .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
            border-left-color: #fff;
        }
        .admin-sidebar .nav-link i {
            margin-right: 0.5rem;
        }
        .admin-sidebar .nav-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 0.75rem 1rem 0.25rem;
            font-weight: bold;
        }
        .admin-main {
            margin-left: 250px;
            padding-top: 72px;
            min-height: 100vh;
        }
        @media (max-width: 768px) {
            .admin-sidebar {
                display: none;
            }
            .admin-main {
                margin-left: 0;
            }
        }
    </style>
    {block name="style"}{/block}
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/admin">
                <i class="bi bi-stars"></i> AI提示词管理后台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" target="_blank">
                            <i class="bi bi-house"></i> 前台首页
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            <img src="{$adminInfo.avatar}" class="rounded-circle" width="24" height="24">
                            <span class="ms-1">{$adminInfo.nickname}</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/admin"><i class="bi bi-speedometer2 me-2"></i>控制台</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/admin/logout"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 侧边栏 -->
    <div class="admin-sidebar" style="width: 250px;">
        <div class="nav-title">主菜单</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'Admin' and $Request.action() == 'index'}active{/if}" href="/admin">
                    <i class="bi bi-speedometer2"></i> 控制台
                </a>
            </li>
        </ul>
        
        <div class="nav-title">内容管理</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'Prompt'}active{/if}" href="/admin/prompt">
                    <i class="bi bi-file-text"></i> 提示词管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'Workflow'}active{/if}" href="/admin/workflow">
                    <i class="bi bi-diagram-3"></i> 工作流管理
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'Comment'}active{/if}" href="/admin/comment">
                    <i class="bi bi-chat-dots"></i> 评论管理
                </a>
            </li>
        </ul>
        
        <div class="nav-title">分类管理</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'Category' && $Request.get('type') == 1}active{/if}" href="/admin/category?type=1">
                    <i class="bi bi-tags"></i> 提示词分类
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'Category' && $Request.get('type') == 2}active{/if}" href="/admin/category?type=2">
                    <i class="bi bi-diagram-3"></i> 工作流分类
                </a>
            </li>
        </ul>
        
        <div class="nav-title">用户管理</div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {if $Request.controller() == 'User'}active{/if}" href="/admin/user">
                    <i class="bi bi-people"></i> 用户列表
                </a>
            </li>
        </ul>
    </div>

    <!-- 主内容区 -->
    <div class="admin-main">
        <div class="container-fluid">
            {block name="content"}{/block}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script src="/static/js/common.js"></script>
    {block name="script"}{/block}
</body>
</html>
