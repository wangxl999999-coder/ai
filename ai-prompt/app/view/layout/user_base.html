{extend name="layout/base" /}

{block name="content"}
<div class="container py-4">
    <div class="row">
        <!-- 左侧菜单 -->
        <div class="col-lg-3 mb-4">
            <div class="card border-0 shadow-sm">
                <!-- 用户信息卡片 -->
                <div class="card-body text-center pb-3">
                    <img src="{$userInfo.avatar}" class="rounded-circle mb-3" width="80" height="80">
                    <h5 class="mb-1">{$userInfo.nickname}</h5>
                    <div class="text-muted small mb-2">
                        <i class="bi bi-star-fill text-warning"></i> 
                        积分：<span class="fw-bold text-primary">{$userInfo.points}</span>
                    </div>
                    <a href="/user/setting" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-gear"></i> 编辑资料
                    </a>
                </div>
                <div class="card-body pt-0">
                    <div class="list-group list-group-flush">
                        <a href="/user" class="list-group-item list-group-item-action {if $Request.action == 'index'}active{/if} border-0">
                            <i class="bi bi-person me-2"></i> 个人中心
                        </a>
                        <a href="/user/my-prompts" class="list-group-item list-group-item-action {if $Request.action == 'myPrompts'}active{/if} border-0">
                            <i class="bi bi-file-text me-2"></i> 我的提示词
                        </a>
                        <a href="/user/my-workflows" class="list-group-item list-group-item-action {if $Request.action == 'myWorkflows'}active{/if} border-0">
                            <i class="bi bi-diagram-3 me-2"></i> 我的工作流
                        </a>
                        <a href="/user/my-favorites" class="list-group-item list-group-item-action {if $Request.action == 'myFavorites'}active{/if} border-0">
                            <i class="bi bi-heart me-2"></i> 我的收藏
                        </a>
                        <a href="/user/my-comments" class="list-group-item list-group-item-action {if $Request.action == 'myComments'}active{/if} border-0">
                            <i class="bi bi-chat-dots me-2"></i> 我的评论
                        </a>
                        <a href="/user/my-points" class="list-group-item list-group-item-action {if $Request.action == 'myPoints'}active{/if} border-0">
                            <i class="bi bi-coin me-2"></i> 积分记录
                        </a>
                        <a href="/user/setting" class="list-group-item list-group-item-action {if $Request.action == 'setting'}active{/if} border-0">
                            <i class="bi bi-gear me-2"></i> 个人设置
                        </a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧内容 -->
        <div class="col-lg-9">
            {block name="user_content"}{/block}
        </div>
    </div>
</div>
{/block}
