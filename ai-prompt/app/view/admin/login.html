<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - AI提示词平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.175);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-stars text-primary fs-1"></i>
                            <h3 class="mt-2">管理后台登录</h3>
                            <p class="text-muted small">请输入管理员账号</p>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" name="username" placeholder="请输入用户名">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">密码</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" name="password" placeholder="请输入密码">
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn">
                                登录
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="/" class="text-decoration-none small">
                                <i class="bi bi-arrow-left"></i> 返回前台
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
    $(function() {
        // 切换密码可见性
        $('#togglePassword').click(function() {
            const input = $('input[name="password"]');
            const icon = $(this).find('i');
            if (input.attr('type') === 'password') {
                input.attr('type', 'text');
                icon.removeClass('bi-eye').addClass('bi-eye-slash');
            } else {
                input.attr('type', 'password');
                icon.removeClass('bi-eye-slash').addClass('bi-eye');
            }
        });
        
        // 登录表单提交
        $('#loginForm').submit(function(e) {
            e.preventDefault();
            
            const username = $('input[name="username"]').val();
            const password = $('input[name="password"]').val();
            
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            if (!password) {
                alert('请输入密码');
                return;
            }
            
            const btn = $('#loginBtn');
            const originalText = btn.text();
            btn.prop('disabled', true).text('登录中...');
            
            $.post('/admin/do-login', {
                username: username,
                password: password
            }, function(res) {
                if (res.code === 200) {
                    alert('登录成功');
                    location.href = res.data.url || '/admin';
                } else {
                    alert(res.msg);
                }
            }, 'json').always(function() {
                btn.prop('disabled', false).text(originalText);
            });
        });
    });
    </script>
</body>
</html>
