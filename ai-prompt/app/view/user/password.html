{extend name="layout/user_base" /}

{block name="user_content"}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-lock me-2"></i>修改密码</h5>
    </div>
    <div class="card-body">
        <form id="passwordForm">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="mb-4">
                        <label class="form-label fw-bold">原密码</label>
                        <input type="password" class="form-control" name="old_password" placeholder="请输入原密码">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">新密码</label>
                        <input type="password" class="form-control" name="password" placeholder="请输入新密码（6-20位）">
                        <div class="form-text">密码长度6-20位，建议包含大小写字母和数字</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">确认新密码</label>
                        <input type="password" class="form-control" name="confirm_password" placeholder="请再次输入新密码">
                    </div>
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 确认修改
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
{/block}

{block name="script"}
<script>
$(function() {
    $('#passwordForm').submit(function(e) {
        e.preventDefault();
        
        const oldPassword = $('input[name="old_password"]').val();
        const password = $('input[name="password"]').val();
        const confirmPassword = $('input[name="confirm_password"]').val();
        
        if (!oldPassword) {
            toastr.error('请输入原密码');
            return;
        }
        
        if (!password) {
            toastr.error('请输入新密码');
            return;
        }
        
        if (password.length < 6 || password.length > 20) {
            toastr.error('密码长度应为6-20位');
            return;
        }
        
        if (password !== confirmPassword) {
            toastr.error('两次输入的密码不一致');
            return;
        }
        
        $.post('/user/update-password', {
            old_password: oldPassword,
            password: password
        }, function(res) {
            if (res.code === 200) {
                toastr.success(res.msg);
                setTimeout(function() {
                    location.href = '/user/login';
                }, 1000);
            } else {
                toastr.error(res.msg);
            }
        }, 'json');
    });
});
</script>
{/block}
